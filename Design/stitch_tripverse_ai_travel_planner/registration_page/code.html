<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registration | TripVerse AI</title>

            "spacing": {

            "fontFamily": {

<style>
        body {
            background-color: #F9FAFB;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(228, 225, 238, 0.5);
        }
        .neumorphic-input {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .neumorphic-input:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-on-surface">
<!-- Hero Background Element (Visual Only) -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -right-[10%] w-[60%] h-[60%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] -left-[10%] w-[40%] h-[50%] bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- Top Navigation (Shell logic: Minimal for focused task) -->
<header class="relative z-50 flex justify-between items-center px-6 h-20 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-h2 text-xl font-bold tracking-tight text-primary">TripVerse AI</span>
</div>
</header>
<main class="relative z-10 flex-grow flex items-center justify-center px-gutter py-xl">
<div class="w-full max-w-[480px]">
<!-- Registration Card -->
<div class="glass-card rounded-2xl p-lg shadow-xl shadow-indigo-500/5">
<!-- Card Header -->
<div class="text-center mb-lg">
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Create an account</h1>
<p class="font-body-md text-on-surface-variant">Join 50,000+ travelers planning with AI</p>
</div>
<!-- Form -->
<form action="#" class="space-y-md" method="POST">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block" for="full_name">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-body-md">person</span>
<input class="w-full h-14 pl-[44px] pr-md bg-surface-container-lowest border-outline-variant rounded-xl neumorphic-input focus:border-primary-container focus:ring-0 font-body-md outline-none" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-body-md">mail</span>
<input class="w-full h-14 pl-[44px] pr-md bg-surface-container-lowest border-outline-variant rounded-xl neumorphic-input focus:border-primary-container focus:ring-0 font-body-md outline-none" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-body-md">lock</span>
<input class="w-full h-14 pl-[44px] pr-md bg-surface-container-lowest border-outline-variant rounded-xl neumorphic-input focus:border-primary-container focus:ring-0 font-body-md outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant block" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-body-md">shield</span>
<input class="w-full h-14 pl-[44px] pr-md bg-surface-container-lowest border-outline-variant rounded-xl neumorphic-input focus:border-primary-container focus:ring-0 font-body-md outline-none" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Checkbox Terms -->
<div class="flex items-start gap-sm py-xs">
<input class="mt-1 rounded border-outline-variant text-primary focus:ring-primary-container" id="terms" type="checkbox"/>
<label class="font-caption text-caption text-on-surface-variant" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- CTA -->
<button class="w-full h-14 bg-primary-container text-on-primary rounded-xl font-label-sm text-body-md font-semibold shadow-lg shadow-indigo-500/20 active:scale-95 transition-all flex items-center justify-center gap-base" type="submit">
                        Sign Up
                        <span class="material-symbols-outlined text-body-md">arrow_forward</span>
</button>
</form>
<!-- Social Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/30"></div></div>
<div class="relative flex justify-center text-xs uppercase tracking-widest"><span class="bg-white/80 px-4 text-outline font-caption">Or continue with</span></div>
</div>
<!-- Social Auth Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="h-12 flex items-center justify-center gap-sm bg-white border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<img alt="Google" class="w-5 h-5" data-alt="Official Google G-logo with primary red, yellow, green, and blue colors on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC93-R_coouUKmMsE_upIvLN9iHeBCzHtavZuqYZC8rngdOGnFW-FyhfGv19DbeyBOxgyco3Wq4lpVHrTHiInMU2y7y-6J2ll6PpCVvQ1MkyN1TQ2p6jG4Vkr-YSD12OLYviPoegPR-gUeNG0iZwYDnoE7E-TAo0StKgWWooVh8GjgpDuWbMoDxRu7uJgxzVwjc1aGGi7--SOTrT8qVSkdin52QvcxEu5lc30xnaUMb0dfg8boESXsKoTqOY5aovBpbiSXHl8rfPw"/>
<span class="font-label-sm text-on-surface">Google</span>
</button>
<button class="h-12 flex items-center justify-center gap-sm bg-white border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label-sm text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="mt-lg text-center">
<p class="font-body-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline transition-all" href="#">Log in</a>
</p>
</div>
</div>
<!-- Decorative Trust Badge -->
<div class="mt-md flex items-center justify-center gap-base opacity-60">
<span class="material-symbols-outlined text-sm">lock_person</span>
<span class="font-caption text-caption uppercase tracking-tighter">Bank-grade encryption for your data</span>
</div>
</div>
</main>
<!-- Footer (Shell logic: Minimal footer for auth pages) -->
<footer class="w-full py-base px-8 mt-auto border-t border-outline-variant/20 bg-white/50 backdrop-blur-sm">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 py-md">
<div class="font-caption text-caption text-on-surface-variant uppercase tracking-widest">
                © 2024 TripVerse AI. Intelligent Serenity in Travel.
            </div>
<div class="flex gap-md">
<a class="font-caption text-caption text-outline hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-caption text-caption text-outline hover:text-primary transition-colors" href="#">Terms</a>
<a class="font-caption text-caption text-outline hover:text-primary transition-colors" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
